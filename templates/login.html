<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Dashboard MBG</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
  <div class="bg"></div>

  <div class="card">
    <h1>Login</h1>
    <p class="sub">Masuk untuk akses dashboard MBG</p>

    {% if success %}
      <div class="success">{{ success }}</div>
    {% endif %}

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label>Username</label>
      <input name="username" placeholder="Masukkan username" required>

      <label>Password</label>
      <div class="pw-wrap">
        <input id="pw-login" name="password" type="password" placeholder="Masukkan password" required>
        <button type="button" class="eye-btn" onclick="togglePw('pw-login', this)" tabindex="-1" aria-label="Tampilkan password">
          <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>

      <button type="submit">Masuk</button>
    </form>

    <div class="form-link">
      Belum punya akun? <a href="/register">Daftar di sini</a>
    </div>
  </div>
<script>
function togglePw(inputId, btn) {
  var input = document.getElementById(inputId);
  var isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.classList.toggle('active', isHidden);
}
</script>
</body>
</html>
